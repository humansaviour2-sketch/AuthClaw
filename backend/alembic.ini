# Alembic Configuration
# Alembic is a lightweight database migration tool for SQLAlchemy
# Documentation: https://alembic.sqlalchemy.org/

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to datestamp.tz_localize()
timezone = UTC

# max length of characters to apply to the
# "slug" field when generating a new migration
# set to -1 to disable, resulting in new migrations
# receiving an integer series number only.
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# when set to 'false', logging is disabled in the
# alembic script, regardless of what's in the
# configuration files for logging; this is
# useful to provide programmatic control over logging's setup from
# scripts > configuration file.  see the default files
# supplied when you run the tutorials in terms of their use of the
# LOG_CFG object.
sqlalchemy.logging_name = alembic

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
